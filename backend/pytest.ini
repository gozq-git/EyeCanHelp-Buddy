[pytest]
# Run from backend/ : python -m pytest
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# pytest-asyncio: let async test functions run without a per-test marker.
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Exclude the manual AgentCore runtime script (needs live AWS ARNs) and the
# load tests (driven by locust, not pytest) from the default collection.
addopts =
    -ra
    --strict-markers
    --ignore=tests/load
    --ignore=tests/test_multi_agent.py

markers =
    unit: fast, isolated tests with no I/O
    integration: tests that exercise FastAPI routes end-to-end (in-process)
