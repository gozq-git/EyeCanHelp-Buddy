services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eyecanhelp-backend
    env_file:
      - ./backend/.env
    environment:
      AGENTCORE_COORDINATOR_ENDPOINT: http://coordinator:8080/invocations
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eyecanhelp-frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"
