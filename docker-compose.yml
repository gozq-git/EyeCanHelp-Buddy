services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eyecanhelp-backend
    env_file:
      - ./backend/.env
    environment:
      AGENTCORE_COORDINATOR_ENDPOINT: http://coordinator:8080/invocations
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eyecanhelp-frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

  # Static server for the generated test artifacts (coverage, pytest, Playwright,
  # Locust). Generate the reports first with `scripts/run-all-tests.sh`, then:
  #   docker compose up reports   →   open http://localhost:8088
  reports:
    image: nginx:1.27-alpine
    container_name: eyecanhelp-reports
    volumes:
      - ./reports:/usr/share/nginx/html:ro
      - ./reports/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8088:80"
