name: Build and Push to ECR

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  sonarqube-scan:
    name: SonarQube Scan (unit test & code_quality)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # - name: Install dependencies
      #   run: npm install --prefix backend

      # - name: Test and coverage
      #   run: npm test --prefix backend
      #   continue-on-error: true

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  snyk-scan-BE:
    name: Snyk Scan BE (SCA & SAST)
    needs: sonarqube-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
        with:
            sparse-checkout: 'backend'
            sparse-checkout-cone-mode: false

      - name: Move files to root
        run: |
          ls -lah
          shopt -s dotglob
          mv backend/* .
          rm -rf backend
          ls -lah

      - name: Run Snyk to check for vulnerabilities (SCA)
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
            command: test --file=requirements.txt --package-manager=pip

      - name: Run Snyk to check for vulnerabilities (SAST)
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
            command: code test

  build-and-push-agents:
    name: Build & Publish Agent Images to ECR
    needs: snyk-scan-BE
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent:
          - name: coordinator
            dockerfile: backend/agents/coordinator/Dockerfile
            ecr_repository: eyecanhelpbuddy/agent-coordinator
          - name: financial
            dockerfile: backend/agents/financial/Dockerfile
            ecr_repository: eyecanhelpbuddy/agent-financial
          - name: healthcare
            dockerfile: backend/agents/healthcare/Dockerfile
            ecr_repository: eyecanhelpbuddy/agent-healthcare
    env:
      AWS_REGION: ap-southeast-1
      AWS_ACCOUNT_ID: 580291028795

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate configuration placeholders
        shell: bash
        run: |
          if [ "$AWS_REGION" = "YOUR_AWS_REGION" ] || [ "$AWS_ACCOUNT_ID" = "YOUR_AWS_ACCOUNT_ID" ]; then
            echo "Replace AWS_REGION and AWS_ACCOUNT_ID placeholders in workflow file."
            exit 1
          fi

      - name: Validate required secrets
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "Missing required secrets: AWS_ACCESS_KEY_ID and/or AWS_SECRET_ACCESS_KEY"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        shell: bash
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          ECR_REPOSITORY: ${{ matrix.agent.ecr_repository }}
          DOCKERFILE: ${{ matrix.agent.dockerfile }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY"
          docker buildx build \
            --platform linux/arm64 \
            -f "$DOCKERFILE" \
            -t "$IMAGE_URI:$IMAGE_TAG" \
            -t "$IMAGE_URI:latest" \
            --push \
            ./backend

  build-and-push-backend:
    name: Build & Publish Backend Image to ECR
    needs: snyk-scan-BE
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-southeast-1
      AWS_ACCOUNT_ID: 580291028795
      ECR_REPOSITORY: eyecanhelpbuddy/backend
      BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "Missing required secrets: AWS_ACCESS_KEY_ID and/or AWS_SECRET_ACCESS_KEY"
            exit 1
          fi

      - name: Validate backend env file secret
        shell: bash
        run: |
          if [ -z "$BACKEND_ENV_FILE" ]; then
            echo "Missing required secret: BACKEND_ENV_FILE"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create backend env file
        shell: bash
        run: |
          printf '%s' "$BACKEND_ENV_FILE" > backend/.env

      - name: Build and push backend Docker image
        shell: bash
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY"
          docker buildx build \
            --platform linux/arm64 \
            -f backend/Dockerfile \
            -t "$IMAGE_URI:$IMAGE_TAG" \
            -t "$IMAGE_URI:latest" \
            --push \
            backend

  build-and-deploy-frontend-s3:
    name: Build Frontend and Deploy to S3
    needs: build-and-push-backend
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-southeast-1
      FRONTEND_S3_BUCKET: eyecanhelpbuddy-580291028795-ap-southeast-1-an/frontend
      FRONTEND_CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.FRONTEND_CLOUDFRONT_DISTRIBUTION_ID }}
      FRONTEND_ENV_FILE: ${{ secrets.FRONTEND_ENV_FILE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "Missing required secrets: AWS_ACCESS_KEY_ID and/or AWS_SECRET_ACCESS_KEY"
            exit 1
          fi

      - name: Validate CloudFront distribution ID
        shell: bash
        run: |
          if [ -z "$FRONTEND_CLOUDFRONT_DISTRIBUTION_ID" ]; then
            echo "Missing required secret: FRONTEND_CLOUDFRONT_DISTRIBUTION_ID"
            exit 1
          fi

      - name: Validate frontend env file secret
        shell: bash
        run: |
          if [ -z "$FRONTEND_ENV_FILE" ]; then
            echo "Missing required secret: FRONTEND_ENV_FILE"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Create frontend env file
        shell: bash
        run: |
          printf '%s' "$FRONTEND_ENV_FILE" > frontend/.env.production

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync frontend dist to S3
        shell: bash
        run: |
          aws s3 sync frontend/dist "s3://$FRONTEND_S3_BUCKET" --delete

      - name: Invalidate CloudFront cache
        shell: bash
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$FRONTEND_CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
