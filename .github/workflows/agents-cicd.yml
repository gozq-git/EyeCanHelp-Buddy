name: Agents Build and Push to ECR

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - backend/agents/**
      - .github/workflows/agents-cicd.yml

permissions:
  contents: read

jobs:
  build-and-push-agents:
    name: Build & Publish Agent Images to ECR
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent:
          - name: coordinator
            dockerfile: backend/agents/coordinator/Dockerfile
            ecr_repository: eyecanhelpbuddy/agent-coordinator
          - name: financial
            dockerfile: backend/agents/financial/Dockerfile
            ecr_repository: eyecanhelpbuddy/agent-financial
          - name: healthcare
            dockerfile: backend/agents/healthcare/Dockerfile
            ecr_repository: eyecanhelpbuddy/agent-healthcare
    env:
      AWS_REGION: ap-southeast-1
      AWS_ACCOUNT_ID: 580291028795
      BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate configuration placeholders
        shell: bash
        run: |
          if [ "$AWS_REGION" = "YOUR_AWS_REGION" ] || [ "$AWS_ACCOUNT_ID" = "YOUR_AWS_ACCOUNT_ID" ]; then
            echo "Replace AWS_REGION and AWS_ACCOUNT_ID placeholders in workflow file."
            exit 1
          fi

      - name: Validate required secrets
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "Missing required secrets: AWS_ACCESS_KEY_ID and/or AWS_SECRET_ACCESS_KEY"
            exit 1
          fi

      - name: Validate backend env file secret
        shell: bash
        run: |
          if [ -z "$BACKEND_ENV_FILE" ]; then
            echo "Missing required secret: BACKEND_ENV_FILE"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create backend env file
        shell: bash
        run: |
          printf '%s' "$BACKEND_ENV_FILE" > backend/.env

      - name: Build and push Docker image
        shell: bash
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          ECR_REPOSITORY: ${{ matrix.agent.ecr_repository }}
          DOCKERFILE: ${{ matrix.agent.dockerfile }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY"
          docker buildx build \
            --platform linux/arm64 \
            -f "$DOCKERFILE" \
            -t "$IMAGE_URI:$IMAGE_TAG" \
            -t "$IMAGE_URI:latest" \
            --push \
            ./backend