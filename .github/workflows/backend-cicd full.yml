name: Backend Full CI/CD Pipeline

on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - backend/**
  #     - '!backend/agents/**'
  #     - .github/workflows/backend-cicd full.yml

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend unit + integration (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run pytest with coverage
        run: |
          python -m pytest \
            --cov=services --cov=routers --cov=schemas --cov=models --cov=database \
            --cov-report=term-missing \
            --cov-report=html:../reports/backend/coverage \
            --html=../reports/backend/report.html --self-contained-html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-report
          path: reports/backend

  sonarqube-scan:
    name: SonarQube Scan (unit test & code_quality)
    needs: backend-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate Sonar token
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "Missing required secret: SONAR_TOKEN"
            exit 1
          fi
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  snyk-scan-BE:
    name: Snyk Scan BE (SCA & SAST)
    needs: sonarqube-scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Validate Snyk token
        shell: bash
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "Missing required secret: SNYK_TOKEN"
            exit 1
          fi
      - name: Run Snyk to check for vulnerabilities (SCA)
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test --file=backend/requirements.txt --package-manager=pip
      - name: Run Snyk to check for vulnerabilities (SAST)
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test

  build-backend-image:
    name: Build backend Docker image
    needs: snyk-scan-BE
    runs-on: ubuntu-latest
    env:
      BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
      LOCAL_IMAGE: backend-local:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate backend env file secret
        shell: bash
        run: |
          if [ -z "$BACKEND_ENV_FILE" ]; then
            echo "Missing required secret: BACKEND_ENV_FILE"
            exit 1
          fi
      - name: Create backend env file
        shell: bash
        run: |
          printf '%s' "$BACKEND_ENV_FILE" > backend/.env
      - name: Build backend Docker image
        shell: bash
        run: |
          docker build \
            -f backend/Dockerfile \
            -t "$LOCAL_IMAGE" \
            backend
      - name: Save image tarball
        shell: bash
        run: |
          docker save "$LOCAL_IMAGE" -o backend-image.tar
      - uses: actions/upload-artifact@v4
        with:
          name: backend-image-tar
          path: backend-image.tar

  trivy-image-scan:
    name: Trivy container image scan (report only)
    needs: build-backend-image
    runs-on: ubuntu-latest
    env:
      LOCAL_IMAGE: backend-local:${{ github.sha }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: backend-image-tar
      - name: Load Docker image
        shell: bash
        run: docker load -i backend-image.tar
      - name: Run Trivy (report-only)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.LOCAL_IMAGE }}
          format: table
          output: trivy-report.txt
          exit-code: '0'
          ignore-unfixed: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.txt

  push-backend-image-to-ecr:
    name: Push backend image to AWS ECR
    needs: trivy-image-scan
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-southeast-1
      ECR_REPOSITORY: eyecanhelpbuddy/backend
      LOCAL_IMAGE: backend-local:${{ github.sha }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: backend-image-tar
      - name: Load Docker image
        shell: bash
        run: docker load -i backend-image.tar
      - name: Validate required secrets
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "Missing required secrets: AWS_ACCESS_KEY_ID and/or AWS_SECRET_ACCESS_KEY"
            exit 1
          fi
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Push backend Docker image
        shell: bash
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY"
          docker tag "$LOCAL_IMAGE" "$IMAGE_URI:$IMAGE_TAG"
          docker tag "$LOCAL_IMAGE" "$IMAGE_URI:latest"
          docker push "$IMAGE_URI:$IMAGE_TAG"
          docker push "$IMAGE_URI:latest"

  e2e-tests:
    name: End-to-end (Playwright)
    needs: push-backend-image-to-ecr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Install E2E deps + browser
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run Playwright (starts Vite via webServer)
        working-directory: e2e
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: reports/e2e

  dast-zap:
    name: DAST (OWASP ZAP baseline)
    needs: e2e-tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Start backend
        run: |
          MONGO_URL="mongodb://localhost:27017/?serverSelectionTimeoutMS=500" \
            python -m uvicorn main:app --host 127.0.0.1 --port 8000 &
          for _ in $(seq 1 30); do curl -sf http://127.0.0.1:8000/ && break; sleep 1; done
      - name: Run OWASP ZAP baseline scan (report-only)
        run: |
          mkdir -p ../reports/zap
          docker run --rm --network host \
            -v "${{ github.workspace }}/reports/zap:/zap/wrk" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://127.0.0.1:8000 \
            -r zap-report.html -J zap-report.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: reports/zap

  load-test:
    name: Stress / load (Locust)
    needs: dast-zap
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Start backend
        run: |
          MONGO_URL="mongodb://localhost:27017/?serverSelectionTimeoutMS=500" \
            python -m uvicorn main:app --host 127.0.0.1 --port 8000 &
          for _ in $(seq 1 30); do curl -sf http://127.0.0.1:8000/ && break; sleep 1; done
      - name: Run Locust (headless)
        run: |
          mkdir -p ../reports/load
          python -m locust -f tests/load/locustfile.py \
            --host http://127.0.0.1:8000 \
            --headless -u 50 -r 10 -t 30s \
            --html ../reports/load/report.html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-report
          path: reports/load
